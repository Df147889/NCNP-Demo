<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIO — مرصد الذكاء الريفي | نموذج تفاعلي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1f7a5c; --green-d:#155843; --green-l:#e8f4ef;
  --gold:#c79a3a; --gold-l:#f8f1e0;
  --ink:#132a24; --muted:#5f7169; --line:#e2e9e6; --bg:#f4f7f6;
  --blue:#2b6cb0; --blue-l:#e8f0f9;
  --red:#c0392b; --red-l:#fbeae8;
  --amber:#b8791a; --amber-l:#fbf1df;
  --purple:#6b46a3; --purple-l:#f0e9f8;
  --radius:14px; --shadow:0 2px 10px rgba(19,42,36,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px}
button{font-family:inherit;cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{width:270px;background:#fff;border-left:1px solid var(--line);position:fixed;top:0;bottom:0;right:0;overflow-y:auto;z-index:20}
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--green-d));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:19px;flex-shrink:0}
.brand h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
.brand span{font-size:11.5px;color:var(--muted);font-weight:500}
.nav-group{padding:14px 12px 4px}
.nav-group h4{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 10px 8px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--ink);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:right;transition:.15s;margin-bottom:1px}
.nav-item:hover{background:var(--green-l)}
.nav-item.active{background:var(--green);color:#fff;font-weight:700}
.nav-item .ic{width:20px;text-align:center;font-size:15px}
.nav-item .v2{margin-right:auto;font-size:9.5px;background:var(--gold-l);color:var(--gold);padding:2px 6px;border-radius:6px;font-weight:700}
.nav-item.active .v2{background:rgba(255,255,255,.25);color:#fff}
.main{margin-right:270px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:15}
.crumb{font-size:13px;color:var(--muted);font-weight:500}
.crumb b{color:var(--ink)}
.topbar .spacer{flex:1}
.role-select{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:6px 12px}
.role-select label{font-size:12px;color:var(--muted);font-weight:600}
.role-select select{border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--green);cursor:pointer;outline:none}
.lang-toggle{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.lang-toggle button{padding:6px 12px;border:none;background:none;font-weight:700;font-size:12.5px;color:var(--muted)}
.lang-toggle button.on{background:var(--green);color:#fff}
.content{padding:28px;max-width:1200px;width:100%;margin:0 auto}
.page-head{margin-bottom:22px}
.page-head h2{font-size:24px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.page-head p{color:var(--muted);font-size:14.5px;margin-top:3px;max-width:760px}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;display:inline-block}
.pill.v1{background:var(--green-l);color:var(--green-d)}
.pill.v2{background:var(--gold-l);color:var(--gold)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:22px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:6px}
.stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
.stat .num.g{color:var(--green)} .stat .num.b{color:var(--blue)} .stat .num.a{color:var(--amber)} .stat .num.p{color:var(--purple)}
h3.sec{font-size:16px;font-weight:800;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
h3.sec:first-child{margin-top:0}
.btn{background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:var(--green-d)}
.btn.ghost{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn.gold{background:var(--gold)}.btn.gold:hover{background:#a67f27}
.btn.sm{padding:7px 14px;font-size:13px}
.btn.gray{background:#eef2f0;color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:right;padding:11px 14px;background:var(--bg);color:var(--muted);font-weight:700;font-size:12.5px;border-bottom:1px solid var(--line)}
td{padding:12px 14px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcfb}
.badge{font-size:11.5px;padding:3px 10px;border-radius:20px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.b-green{background:var(--green-l);color:var(--green-d)}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-red{background:var(--red-l);color:var(--red)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-gray{background:#eef2f0;color:var(--muted)}
.stepper{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:22px;box-shadow:var(--shadow);overflow-x:auto}
.step{display:flex;align-items:center;gap:9px;padding:6px 4px;flex-shrink:0}
.step .cir{width:26px;height:26px;border-radius:50%;background:#eef2f0;color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;flex-shrink:0}
.step.done .cir{background:var(--green);color:#fff}
.step.cur .cir{background:var(--gold);color:#fff;box-shadow:0 0 0 4px var(--gold-l)}
.step .t{font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.step.done .t,.step.cur .t{color:var(--ink)}
.step .arrow{color:var(--line);font-size:14px}
.ai-box{background:linear-gradient(135deg,#f3f0fa,#eef4fb);border:1px solid #ddd6f0;border-radius:var(--radius);padding:18px}
.ai-head{display:flex;align-items:center;gap:9px;font-weight:800;color:var(--purple);font-size:14px;margin-bottom:12px}
.ai-head .spark{width:26px;height:26px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
.confidence{height:7px;background:#e5e0f0;border-radius:20px;overflow:hidden;margin-top:5px}
.confidence>i{display:block;height:100%;background:linear-gradient(90deg,var(--purple),#8a63c7);border-radius:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-family:inherit;font-size:14px;background:#fff}
.field textarea{resize:vertical;min-height:80px}
.note{background:var(--green-l);border-right:3px solid var(--green);padding:11px 15px;border-radius:8px;font-size:13px;color:var(--green-d)}
.note.gold{background:var(--gold-l);border-color:var(--gold);color:var(--amber)}
.note.blue{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}
.q-item{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:#fff}
.q-item .chk{width:22px;height:22px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.q-item .chk.off{background:#fff;border:1.5px solid var(--line)}
.q-item .qtext{font-weight:600;font-size:14px}
.q-item .qmeta{font-size:12px;color:var(--muted);margin-top:3px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.bar-row .bl{width:190px;font-size:13.5px;font-weight:600;flex-shrink:0}
.bar-track{flex:1;height:26px;background:#eef2f0;border-radius:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:700;font-size:12.5px}
.bar-row .bv{width:52px;text-align:left;font-weight:800;flex-shrink:0}
.timeline{position:relative;padding-right:22px}
.timeline::before{content:'';position:absolute;right:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item::before{content:'';position:absolute;right:-19px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2.5px solid #fff;box-shadow:0 0 0 1.5px var(--green)}
.tl-item .tt{font-weight:700;font-size:13.5px}
.tl-item .td{font-size:12.5px;color:var(--muted)}
.map-wrap{display:grid;grid-template-columns:1fr 280px;gap:16px}
@media(max-width:900px){.map-wrap{grid-template-columns:1fr}}
.legend-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13px}
.legend-row .sw{width:16px;height:16px;border-radius:5px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:.3s;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.role-card{border:1px solid var(--line);border-radius:12px;padding:15px;background:#fff}
.role-card .rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.role-card .rn{font-weight:800;font-size:14.5px}
.role-card .rd{font-size:12.5px;color:var(--muted)}
.avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.gov-banner{background:linear-gradient(120deg,var(--green-d),var(--green));color:#fff;border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:22px}
.gov-banner .gi{width:40px;height:40px;background:rgba(255,255,255,.15);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.gov-banner b{font-weight:800}
.gov-banner p{font-size:13px;opacity:.92}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">RIO</div>
      <div><h1>مرصد الذكاء الريفي</h1><span>Rural Intelligence Observatory</span></div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="crumb" id="crumb"></div>
      <div class="spacer"></div>
      <div class="lang-toggle">
        <button class="on">عربي</button>
        <button onclick="toast('العرض بالإنجليزية متاح في النسخة الأولى — واجهة تجريبية')">EN</button>
      </div>
      <div class="role-select">
        <label>الدور:</label>
        <select id="role" onchange="changeRole()">
          <option>مسؤول بحوث الجمعية</option>
          <option>المُراجِع / المُعتمِد</option>
          <option>مشرف المركز</option>
          <option>مدير الجمعية</option>
          <option>محلل البيانات</option>
        </select>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const NAV = [
  {group:'عام', items:[{id:'dashboard', ic:'▣', t:'لوحة البيانات'}]},
  {group:'رحلة التقييم — النسخة الأولى', items:[
    {id:'register', ic:'①', t:'التسجيل والموافقة'},
    {id:'need', ic:'②', t:'تعريف الحاجة'},
    {id:'survey', ic:'③', t:'بناء الاستبيان'},
    {id:'collect', ic:'④', t:'جمع الردود'},
    {id:'score', ic:'⑤', t:'التقييم Top-5'},
    {id:'review', ic:'⑥', t:'المراجعة والاعتماد'},
    {id:'report', ic:'⑦', t:'التقارير والتصدير'},
    {id:'share', ic:'⑧', t:'المشاركة بين الجهات'},
  ]},
  {group:'الحوكمة والإشراف', items:[
    {id:'oversight', ic:'◎', t:'إشراف المركز'},
    {id:'audit', ic:'❐', t:'سجل التدقيق'},
    {id:'library', ic:'▤', t:'المكتبة المرجعية'},
  ]},
  {group:'النسخة الثانية — النطاق الكامل', items:[
    {id:'map', ic:'⬡', t:'الخريطة الجغرافية', v2:true},
    {id:'needsmgmt', ic:'⧉', t:'إدارة الاحتياجات', v2:true},
    {id:'import', ic:'⇪', t:'استيراد البيانات', v2:true},
    {id:'dedupe', ic:'⧎', t:'كشف التكرار الدلالي', v2:true},
    {id:'citizen', ic:'☺', t:'قناة المواطن', v2:true},
    {id:'methodology', ic:'⚙', t:'إدارة المنهجية والأوزان', v2:true},
    {id:'trends', ic:'⟁', t:'دورات القياس والاتجاهات', v2:true},
    {id:'roles', ic:'⚑', t:'نموذج الأدوار التسعة', v2:true},
  ]},
];
const TITLES = {
  dashboard:'لوحة البيانات', register:'التسجيل والموافقة', need:'تعريف الحاجة', survey:'بناء الاستبيان',
  collect:'جمع الردود الميدانية', score:'التقييم وأولويات Top-5', review:'طابور المراجعة والاعتماد',
  report:'التقارير والتصدير', share:'المشاركة بين الجهات', oversight:'إشراف المركز', audit:'سجل التدقيق',
  library:'المكتبة المرجعية', map:'الخريطة الجغرافية التفاعلية', needsmgmt:'إدارة الاحتياجات المهيكلة',
  import:'استيراد البيانات', dedupe:'كشف التكرار الدلالي', citizen:'قناة المواطن / المستفيد',
  methodology:'إدارة المنهجية والأوزان', trends:'دورات القياس والاتجاهات', roles:'نموذج الأدوار التسعة'
};
function buildNav(){
  let h='';
  NAV.forEach(g=>{
    h+='<div class="nav-group"><h4>'+g.group+'</h4>';
    g.items.forEach(it=>{
      h+='<button class="nav-item" data-id="'+it.id+'" onclick="go(\''+it.id+'\')"><span class="ic">'+it.ic+'</span><span>'+it.t+'</span>'+(it.v2?'<span class="v2">V2</span>':'')+'</button>';
    });
    h+='</div>';
  });
  document.getElementById('nav').innerHTML=h;
}
let current='dashboard';
function go(id){
  current=id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  const isV2 = NAV.some(g=>g.items.some(i=>i.id===id&&i.v2));
  document.getElementById('crumb').innerHTML = 'RIO / <b>'+TITLES[id]+'</b> '+(isV2?'<span class="pill v2">النسخة الثانية</span>':'<span class="pill v1">النسخة الأولى</span>');
  document.getElementById('content').innerHTML = SCREENS[id]();
  window.scrollTo(0,0);
}
function changeRole(){ toast('تم التبديل إلى دور: '+document.getElementById('role').value); }
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML='✓ '+msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2600);
}
function stepper(cur){
  const steps=['التسجيل','الحاجة','الاستبيان','الردود','التقييم','المراجعة','التقرير','المشاركة'];
  let h='<div class="stepper">';
  steps.forEach((s,i)=>{
    const n=i+1; const cls=n<cur?'done':(n===cur?'cur':'');
    h+='<div class="step '+cls+'"><div class="cir">'+(n<cur?'✓':n)+'</div><div class="t">'+s+'</div></div>';
    if(i<steps.length-1)h+='<div class="step"><span class="arrow">‹</span></div>';
  });
  return h+'</div>';
}
const SCREENS = {};

SCREENS.dashboard = ()=>`
  <div class="gov-banner">
    <div class="gi">🛡️</div>
    <div><b>مبدأ الحوكمة الحاكم للمنصة</b>
      <p>الذكاء الاصطناعي يقترح فقط — والإنسان يراجع ويعتمد قبل نشر أي شيء. لا تصنيف أو أولوية أو تقرير يُنشر تلقائياً، ولا تقرير جهة يُتاح لجهة أخرى إلا بموافقتها.</p></div>
  </div>
  <div class="page-head"><h2>لوحة البيانات <span class="pill v1">جمعية تنمية القرى — الرياض</span></h2>
  <p>نظرة عامة على نشاط الجهة داخل مساحة عملها الخاصة والمعزولة.</p></div>
  <div class="grid g4">
    <div class="stat"><div class="lbl">📋 الدراسات النشطة</div><div class="num g">6</div><div class="sub">٢ قيد جمع الردود</div></div>
    <div class="stat"><div class="lbl">📥 الردود المجمّعة</div><div class="num b">1,284</div><div class="sub">هذا الشهر +٣٤٢</div></div>
    <div class="stat"><div class="lbl">⏳ بانتظار المراجعة</div><div class="num a">4</div><div class="sub">١ تجاوز مهلة SLA</div></div>
    <div class="stat"><div class="lbl">📤 طلبات مشاركة</div><div class="num p">3</div><div class="sub">١ بانتظار قرارك</div></div>
  </div>
  <div class="grid g2" style="margin-top:16px">
    <div class="card pad">
      <h3 class="sec">📈 أحدث الدراسات</h3>
      <table>
        <tr><th>الدراسة</th><th>المرحلة</th><th>الحالة</th></tr>
        <tr><td>احتياجات المياه — المنطقة الجنوبية</td><td>التقييم</td><td><span class="badge b-amber">⏳ مراجعة</span></td></tr>
        <tr><td>خدمات التعليم الريفي</td><td>جمع الردود</td><td><span class="badge b-blue">● نشطة</span></td></tr>
        <tr><td>الرعاية الصحية الأولية بالقرى</td><td>منشورة</td><td><span class="badge b-green">✓ منشورة</span></td></tr>
        <tr><td>الطرق والبنية التحتية</td><td>التقرير</td><td><span class="badge b-blue">● نشطة</span></td></tr>
      </table>
    </div>
    <div class="card pad">
      <h3 class="sec">🔔 يحتاج انتباهك</h3>
      <div class="timeline">
        <div class="tl-item"><div class="tt">اقتراح تصنيف من الذكاء الاصطناعي بانتظار الاعتماد</div><div class="td">دراسة المياه — ثقة ٩٢٪ · قبل ١٠ دقائق</div></div>
        <div class="tl-item"><div class="tt">طلب مشاركة تقرير من «جمعية القرى — عسير»</div><div class="td">بانتظار موافقة المالك · قبل ساعة</div></div>
        <div class="tl-item"><div class="tt">⚠️ عنصر مراجعة اقترب من تجاوز مهلة SLA</div><div class="td">اعتماد استبيان · متبقٍ ٤٥ دقيقة</div></div>
